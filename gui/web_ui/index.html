<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Project Ocean</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="title-bar" id="drag-region">
  <div class="title-bar-left">
    <span class="title-bar-logo-placeholder"></span>
    <span>Project Ocean</span>
  </div>
  <div class="title-bar-buttons">
    <button class="title-bar-button" id="minimize-btn" aria-label="Minimize">&#x2013;</button>
    <button class="title-bar-button close" id="close-btn" aria-label="Close">&#x2715;</button>
  </div>
</div>

<div class="app">
  <nav class="sidebar">
    <div class="sidebar-logo"></div>
    <button class="nav-icon active" data-tooltip="Play">
      <svg viewBox="0 0 24 24"><path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/></svg>
    </button>
    <button class="nav-icon" data-tooltip="Info">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><line x1="12" y1="11" x2="12" y2="17" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="7.5" r="1" fill="currentColor"/></svg>
    </button>
    <div class="sidebar-spacer"></div>
    <button class="nav-icon" data-tooltip="Settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M19.1 4.9 17 7M7 17l-2.1 2.1" stroke="currentColor" stroke-width="2"/></svg>
    </button>
  </nav>

  <main class="content">
    <header class="topbar">
      <div class="status-pill">
        <span class="status-dot online"></span>
        <span class="status-text">Fortnite 8.51</span>
        <span class="status-state">ONLINE</span>
      </div>
      <div class="topbar-spacer"></div>
      <span class="clock" id="clock-text">7:41 PM</span>
      <div class="divider"></div>
      <div class="user-pill">
        <span class="user-avatar-placeholder">A</span>
        <div class="user-info">
          <span class="user-name">ako</span>
          <span class="user-role">Member</span>
        </div>
        <svg class="chevron" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </div>
    </header>

    <h1 class="page-title">Play</h1>
    <p class="page-subtitle">Play now, <span class="accent">akosamaa!</span></p>

    <section class="hero-banner">
      <div class="hero-glow"></div>
      <div class="hero-tag">PROJECT OCEAN</div>
      <h2 class="hero-title">X Marks The Spot</h2>
      <p class="hero-description">Season 8 &middot; Pirate Cannons, Ballers &amp; Reboot Vans</p>
      <div class="hero-actions" id="hero-actions" data-has-version="false">
        <div class="version-badge" id="version-badge">8.51</div>
        <button class="btn-primary" id="launch-btn">Launch Fortnite</button>
        <button class="btn-icon danger" id="remove-btn" aria-label="Remove build">
          <svg viewBox="0 0 24 24"><path d="M6 7h12M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m-9 0 1 13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1l1-13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <button class="btn-primary" id="import-btn">Import a build to get started</button>
      </div>
    </section>

    <section class="whats-new">
      <div class="whats-new-header">
        <h3>What's new</h3>
        <span class="unread-badge">2 unread</span>
      </div>
      <div class="news-grid">
        <article class="news-card">
          <div class="news-badges">
            <span class="news-badge unread">UNREAD</span>
            <span class="news-badge tag">LAUNCH</span>
          </div>
          <span class="news-title">Project Ocean is Live</span>
        </article>
        <article class="news-card">
          <div class="news-badges">
            <span class="news-badge unread">UNREAD</span>
            <span class="news-badge tag season">SEASON 8</span>
          </div>
          <span class="news-title">Season 8 &ndash; X Marks The Spot</span>
        </article>
      </div>
    </section>
  </main>
</div>

<script src="script.js"></script>
</body>
</html>
